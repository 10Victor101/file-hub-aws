spring.application.name=filehub
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:filehub}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:filehub}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
